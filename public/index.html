<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SB Intake">
<meta name="theme-color" content="#1A5276">
<link rel="manifest" href='data:application/manifest+json,{"name":"SB Signal Intake","short_name":"SB Intake","display":"standalone","background_color":"#f0f4f8","theme_color":"#1A5276","orientation":"portrait"}'>
<title>SB Signal Intake</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  font-size: 16px;
  background: #f0f4f8;
  color: #1a1a1a;
  overscroll-behavior: none;
}

.header {
  background: #1A5276;
  color: white;
  padding: 14px 16px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 17px; font-weight: 700; }
.header p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }

.content {
  padding: 14px 14px 120px;
  max-width: 600px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 18px 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #1A5276;
  margin-bottom: 6px;
}
.hint { font-weight: 400; color: #999; font-size: 12px; }

input[type="text"],
input[type="url"],
textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  color: #1a1a1a;
  background: #fafafa;
  -webkit-appearance: none;
  transition: border-color 0.15s;
  line-height: 1.4;
}
input:focus, textarea:focus {
  outline: none;
  border-color: #1A5276;
  background: white;
  box-shadow: 0 0 0 3px rgba(26,82,118,0.1);
}
textarea { resize: vertical; min-height: 110px; }

.tab-bar {
  display: flex;
  background: #f0f4f8;
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 18px;
  gap: 2px;
}
.tab-btn {
  flex: 1;
  padding: 10px 6px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-height: 54px;
  justify-content: center;
  -webkit-appearance: none;
}
.tab-btn .tab-icon  { font-size: 20px; line-height: 1; }
.tab-btn .tab-label { font-size: 11px; }
.tab-btn.active {
  background: white;
  color: #1A5276;
  box-shadow: 0 1px 4px rgba(0,0,0,0.12);
}

.panel { display: none; }
.panel.active { display: block; }

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed #ccc;
  border-radius: 10px;
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.upload-zone:hover { border-color: #1A5276; background: #f7fafc; }
.upload-zone input  { display: none; }
.upload-icon  { font-size: 36px; line-height: 1; }
.upload-label { font-size: 14px; color: #555; font-weight: 500; }
.upload-sub   { font-size: 12px; color: #aaa; }

/* ── Photos grid ── */
.photos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.thumb-wrap {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 1;
  background: #f0f4f8;
}
.thumb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.thumb-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.photos-count {
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
.btn-add-more {
  width: 100%;
  padding: 10px;
  border: 1.5px dashed #1A5276;
  border-radius: 8px;
  background: none;
  color: #1A5276;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-appearance: none;
  margin-top: 4px;
}

/* ── Sticky footer ── */
.sticky-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid #eee;
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 200;
}
.sticky-footer-inner { max-width: 600px; margin: 0 auto; }

/* ── Buttons ── */
.btn {
  display: block;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  -webkit-appearance: none;
  transition: opacity 0.15s, background 0.15s;
  min-height: 52px;
}
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-green { background: #1E8449; color: white; }
.btn-green:active { background: #186038; }
.btn-blue  { background: #1A5276; color: white; }
.btn-blue:active  { background: #154360; }
.btn-ghost {
  background: none;
  color: #666;
  border: 1.5px solid #ddd;
  margin-top: 8px;
  font-size: 15px;
}
.btn-ghost:active { background: #f0f4f8; }

/* ── Status ── */
.status {
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.5;
  margin-top: 10px;
  display: none;
}
.status.loading { background: #d6eaf8; color: #1A5276; display: block; }
.status.success { background: #d5f5e3; color: #1E8449; display: block; }
.status.error   { background: #fadbd8; color: #c0392b; display: block; }

/* ── AI Preview ── */
.preview-title {
  font-size: 15px;
  font-weight: 700;
  color: #1A5276;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid #d5f5e3;
}
.ai-rows { display: flex; flex-direction: column; }
.ai-row {
  display: flex;
  flex-direction: column;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
  gap: 3px;
}
.ai-row:last-child { border-bottom: none; }
.ai-key { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
.ai-val { font-size: 14px; color: #1a1a1a; line-height: 1.5; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}
.badge-high      { background: #fadbd8; color: #922b21; }
.badge-medium    { background: #fdebd0; color: #7d6608; }
.badge-low       { background: #d5f5e3; color: #1e8449; }
.badge-yes       { background: #fdebd0; color: #7d6608; }
.badge-no        { background: #d5f5e3; color: #1e8449; }
.badge-conf-high { background: #d5f5e3; color: #1e8449; }
.badge-conf-med  { background: #fdebd0; color: #7d6608; }
.badge-conf-low  { background: #fadbd8; color: #922b21; }

.hook-box {
  background: #eaf3fb;
  border-left: 3px solid #1A5276;
  padding: 10px 12px;
  border-radius: 0 6px 6px 0;
  font-style: italic;
  color: #1A5276;
  font-size: 14px;
  line-height: 1.5;
}

hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }

/* ── Password gate ── */
#password-gate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 24px;
  text-align: center;
  background: #f0f4f8;
}
.gate-logo   { font-size: 52px; margin-bottom: 16px; }
.gate-title  { font-size: 20px; font-weight: 700; color: #1A5276; margin-bottom: 6px; }
.gate-sub    { font-size: 14px; color: #666; margin-bottom: 28px; }
.gate-box    { background: white; border-radius: 14px; padding: 24px 20px; width: 100%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.gate-input  {
  width: 100%; padding: 14px 16px; border: 1.5px solid #ddd; border-radius: 8px;
  font-size: 16px; font-family: inherit; margin-bottom: 12px; background: #fafafa;
  -webkit-appearance: none; text-align: center; letter-spacing: 0.05em;
}
.gate-input:focus { outline: none; border-color: #1A5276; background: white; }
.gate-error  { font-size: 13px; color: #c0392b; margin-top: 8px; min-height: 18px; }

@media (min-width: 600px) {
  .tab-btn .tab-label { font-size: 12px; }
  .content { padding-top: 20px; }
}
</style>
</head>
<body>

<!-- Password gate -->
<div id="password-gate" style="display:none;">
  <div class="gate-logo">🌵</div>
  <div class="gate-title">Succulents Box</div>
  <div class="gate-sub">Signal Intake — team access only</div>
  <div class="gate-box">
    <input type="password" id="gate-input" class="gate-input" placeholder="Enter team password"
      onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="btn btn-green" onclick="checkPassword()" id="gate-btn">Unlock</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- Main app (hidden until password correct) -->
<div id="app" style="display:none;">

<div class="header">
  <h1>🌵 Signal Intake</h1>
  <p id="header-sub">Submit a signal — AI fills the structured fields automatically.</p>
</div>

<div class="content">

  <div class="card" id="input-card">

    <div class="field">
      <label>Your name</label>
      <input type="text" id="submitted-by" placeholder="e.g. Tho" maxlength="60" autocomplete="name">
    </div>

    <hr>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-photo" onclick="switchTab('photo', this)">
        <span class="tab-icon">📷</span>
        <span class="tab-label">Screenshot</span>
      </button>
      <button class="tab-btn" id="tab-text" onclick="switchTab('text', this)">
        <span class="tab-icon">📝</span>
        <span class="tab-label">Paste text</span>
      </button>
      <button class="tab-btn" id="tab-url" onclick="switchTab('url', this)">
        <span class="tab-icon">🔗</span>
        <span class="tab-label">Link</span>
      </button>
    </div>

    <!-- PHOTO panel -->
    <div id="panel-photo" class="panel active">
      <div class="field">
        <label>Upload screenshots <span class="hint">(up to 10 — post + comments)</span></label>

        <!-- Empty state: upload zone -->
        <div class="upload-zone" id="upload-zone" onclick="triggerUpload()">
          <div class="upload-icon">📸</div>
          <div class="upload-label">Tap to choose or take a photo</div>
          <div class="upload-sub">JPG or PNG · max 5 MB each</div>
          <input type="file" id="photo-file" accept="image/*" multiple onchange="onFilesChosen(event)">
        </div>

        <!-- Filled state: thumbnails grid -->
        <div id="photos-grid"  class="photos-grid"  style="display:none"></div>
        <div id="photos-count" class="photos-count" style="display:none"></div>
        <button id="add-more-btn" class="btn-add-more" style="display:none" onclick="triggerUpload()">+ Add more photos</button>
      </div>

      <div class="field">
        <label>Extra context <span class="hint">(optional)</span></label>
        <textarea id="photo-notes" rows="3" placeholder="e.g. From Houseplants for Beginners FB group. Post got 23 comments in 2 days."></textarea>
      </div>
    </div>

    <!-- TEXT panel -->
    <div id="panel-text" class="panel">
      <div class="field">
        <label>What did you find?</label>
        <textarea id="text-input" rows="6" placeholder="Paste a caption, comment thread, or describe what you observed.&#10;&#10;e.g. Several posts this week in Houseplants for Beginners asking why string of pearls keeps dying — wrong soil, overwatering, not enough sun."></textarea>
      </div>
      <div class="field">
        <label>Source URL <span class="hint">(optional)</span></label>
        <input type="url" id="text-url" placeholder="https://...">
      </div>
    </div>

    <!-- URL panel -->
    <div id="panel-url" class="panel">
      <div class="field">
        <label>Post or video URL</label>
        <input type="url" id="url-input" placeholder="https://www.tiktok.com/@...">
      </div>
      <div class="field">
        <label>Your notes <span class="hint">(optional)</span></label>
        <textarea id="url-notes" rows="4" placeholder="e.g. 18k views, comments asking why the plant stretches. Creator doesn't explain it."></textarea>
      </div>
    </div>

    <div class="status" id="analyze-status"></div>

  </div><!-- /input-card -->

  <!-- AI preview card -->
  <div class="card" id="preview-card" style="display:none;">
    <div class="preview-title">🤖 AI Analysis — review before saving</div>
    <div class="ai-rows" id="ai-fields"></div>
    <div class="status" id="save-status"></div>
  </div>

</div><!-- /content -->

<div class="sticky-footer">
  <div class="sticky-footer-inner">
    <div id="footer-analyze">
      <button class="btn btn-green" id="analyze-btn" onclick="handleAnalyze()">✨ Analyze with AI</button>
    </div>
    <div id="footer-save" style="display:none;">
      <button class="btn btn-blue" id="save-btn" onclick="handleSave()">✅ Save to Intake Sheet</button>
      <button class="btn btn-ghost" onclick="resetAll()">← Submit another signal</button>
    </div>
  </div>
</div>

</div><!-- /app -->

<script>
// ── password gate ─────────────────────────────────────────────
var AUTH_KEY    = 'sb_auth_ok';
var AUTH_EXPIRY = 7 * 24 * 60 * 60 * 1000; // 7 days

function isAuthed() {
  var stored = localStorage.getItem(AUTH_KEY);
  if (!stored) return false;
  var data = JSON.parse(stored);
  return Date.now() < data.expires;
}

function showGate()  {
  document.getElementById('password-gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  setTimeout(function() { document.getElementById('gate-input').focus(); }, 100);
}

function showApp() {
  document.getElementById('password-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

async function checkPassword() {
  var pw  = document.getElementById('gate-input').value;
  var btn = document.getElementById('gate-btn');
  var err = document.getElementById('gate-error');
  if (!pw) return;

  btn.disabled    = true;
  btn.textContent = '…';
  err.textContent = '';

  try {
    var res  = await fetch('/.netlify/functions/auth', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pw })
    });
    var data = await res.json();
    if (data.success) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({ expires: Date.now() + AUTH_EXPIRY }));
      showApp();
    } else {
      err.textContent = data.error || 'Incorrect password.';
      document.getElementById('gate-input').select();
    }
  } catch (e) {
    err.textContent = 'Connection error — try again.';
  }

  btn.disabled    = false;
  btn.textContent = 'Unlock';
}

// ── state ────────────────────────────────────────────────────
var activeTab = 'photo';
var images    = [];   // [{ base64, mimeType, name, dataUrl }]
var payload   = null;
var aiFields  = null;

// ── init ─────────────────────────────────────────────────────
window.onload = function () {
  if (isAuthed()) {
    showApp();
  } else {
    showGate();
  }
  var saved = localStorage.getItem('sb_intake_name');
  if (saved) document.getElementById('submitted-by').value = saved;
};

// ── tabs ─────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p)   { p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  activeTab = name;
}

// ── multi-photo upload ────────────────────────────────────────
function triggerUpload() {
  document.getElementById('photo-file').click();
}

function onFilesChosen(e) {
  var files     = Array.from(e.target.files);
  var remaining = 10 - images.length;
  if (!files.length || remaining <= 0) return;

  var toProcess = files.slice(0, remaining);
  if (files.length > remaining) {
    alert('You can add ' + remaining + ' more photo(s). Only the first ' + remaining + ' will be used.');
  }

  toProcess.forEach(function(file) {
    if (file.size > 5 * 1024 * 1024) {
      alert(file.name + ' is over 5 MB — skipped.');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(ev) {
      var dataUrl = ev.target.result;
      resizeIfNeeded(dataUrl, file.type || 'image/jpeg', function(b64, mime) {
        images.push({ base64: b64, mimeType: mime, name: file.name, dataUrl: dataUrl });
        renderPhotosGrid();
      });
    };
    reader.readAsDataURL(file);
  });

  e.target.value = ''; // allow re-selecting same files
}

function removeImage(idx) {
  images.splice(idx, 1);
  renderPhotosGrid();
}

function renderPhotosGrid() {
  var zone     = document.getElementById('upload-zone');
  var grid     = document.getElementById('photos-grid');
  var count    = document.getElementById('photos-count');
  var addMore  = document.getElementById('add-more-btn');

  if (images.length === 0) {
    zone.style.display    = 'flex';
    grid.style.display    = 'none';
    count.style.display   = 'none';
    addMore.style.display = 'none';
    return;
  }

  zone.style.display    = 'none';
  grid.style.display    = 'grid';
  count.style.display   = 'block';
  count.textContent     = images.length + ' / 10 photos selected';
  addMore.style.display = images.length < 10 ? 'block' : 'none';

  grid.innerHTML = images.map(function(img, i) {
    return '<div class="thumb-wrap">'
      + '<img src="' + img.dataUrl + '" class="thumb-img" alt="photo ' + (i+1) + '">'
      + '<button class="thumb-remove" onclick="removeImage(' + i + ')">×</button>'
      + '</div>';
  }).join('');
}

// ── resize ────────────────────────────────────────────────────
function resizeIfNeeded(dataUrl, mimeType, cb) {
  var img = new Image();
  img.onload = function() {
    var MAX = 1200;
    if (img.width <= MAX && img.height <= MAX) { cb(dataUrl.split(',')[1], mimeType); return; }
    var scale  = MAX / Math.max(img.width, img.height);
    var canvas = document.createElement('canvas');
    canvas.width  = Math.round(img.width  * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    var resized = canvas.toDataURL('image/jpeg', 0.85);
    cb(resized.split(',')[1], 'image/jpeg');
  };
  img.src = dataUrl;
}

// ── status ────────────────────────────────────────────────────
function showStatus(id, msg, type) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className   = 'status ' + type;
}
function hideStatus(id) { document.getElementById(id).className = 'status'; }

// ── analyze ───────────────────────────────────────────────────
async function handleAnalyze() {
  var name = document.getElementById('submitted-by').value.trim();
  if (!name) { alert('Please enter your name first.'); document.getElementById('submitted-by').focus(); return; }
  localStorage.setItem('sb_intake_name', name);

  payload = { submittedBy: name };

  if (activeTab === 'photo') {
    if (!images.length) { alert('Please choose at least one screenshot.'); return; }
    payload.images   = images.map(function(i) { return { base64: i.base64, mimeType: i.mimeType }; });
    payload.rawInput = document.getElementById('photo-notes').value.trim();
    payload.sourceUrl = '';

  } else if (activeTab === 'text') {
    var raw = document.getElementById('text-input').value.trim();
    if (!raw) { alert('Please paste some text first.'); return; }
    payload.rawInput  = raw;
    payload.sourceUrl = document.getElementById('text-url').value.trim();

  } else {
    var url = document.getElementById('url-input').value.trim();
    if (!url) { alert('Please enter a URL.'); return; }
    payload.sourceUrl = url;
    payload.rawInput  = document.getElementById('url-notes').value.trim();
  }

  var btn = document.getElementById('analyze-btn');
  btn.disabled    = true;
  btn.textContent = '⏳ Analyzing…';
  showStatus('analyze-status', 'Claude is reading your signal — about 10 seconds…', 'loading');

  try {
    var res    = await fetch('/.netlify/functions/analyze', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    var result = await res.json();
    onAnalyzeOk(result);
  } catch (err) {
    onAnalyzeFail(err);
  }
}

function onAnalyzeOk(result) {
  var btn = document.getElementById('analyze-btn');
  btn.disabled    = false;
  btn.textContent = '✨ Analyze with AI';

  if (result.error) { showStatus('analyze-status', '❌ ' + result.error, 'error'); return; }
  hideStatus('analyze-status');

  aiFields = result.fields;
  renderPreview(result.fields);
  document.getElementById('preview-card').style.display   = 'block';
  document.getElementById('footer-analyze').style.display = 'none';
  document.getElementById('footer-save').style.display    = 'block';
  document.getElementById('preview-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function onAnalyzeFail(err) {
  var btn = document.getElementById('analyze-btn');
  btn.disabled    = false;
  btn.textContent = '✨ Analyze with AI';
  showStatus('analyze-status', '❌ ' + (err.message || err), 'error');
}

// ── preview ───────────────────────────────────────────────────
function mkBadge(val, type) {
  var v   = (val || '').toLowerCase();
  var cls = 'badge';
  if (type === 'priority')   cls += v === 'high' ? ' badge-high' : v === 'medium' ? ' badge-medium' : ' badge-low';
  if (type === 'review')     cls += v === 'yes'  ? ' badge-yes'  : ' badge-no';
  if (type === 'confidence') cls += v === 'high' ? ' badge-conf-high' : v === 'medium' ? ' badge-conf-med' : ' badge-conf-low';
  return '<span class="' + cls + '">' + (val || '—') + '</span>';
}
function mkRow(key, val) {
  return '<div class="ai-row"><div class="ai-key">' + key + '</div><div class="ai-val">' + (val || '—') + '</div></div>';
}

function renderPreview(f) {
  document.getElementById('ai-fields').innerHTML =
    mkRow('Topic',             f.topic) +
    mkRow('Plant / product',   f.plant_product) +
    mkRow('Platform',          f.platform) +
    mkRow('Signal type',       f.signal_type) +
    mkRow('Source',            f.source_name) +
    mkRow('Summary',           f.caption_summary) +
    mkRow('Repeated theme',    f.repeated_theme) +
    mkRow('Audience language', f.audience_language) +
    mkRow('Why it matters',    f.why_it_matters) +
    mkRow('Catalog fit',       f.catalog_fit_guess) +
    mkRow('Content pillar',    f.content_pillar) +
    mkRow('Shelf life',        f.shelf_life) +
    mkRow('Priority',          mkBadge(f.priority_guess, 'priority')) +
    '<div class="ai-row"><div class="ai-key">Suggested hook</div><div class="ai-val"><div class="hook-box">' + (f.suggested_hook || '—') + '</div></div></div>' +
    mkRow('Suggested format',  f.suggested_format) +
    mkRow('AI confidence',     mkBadge(f.ai_confidence, 'confidence')) +
    mkRow('Needs review?',     mkBadge(f.needs_human_review, 'review'));
}

// ── save ──────────────────────────────────────────────────────
async function handleSave() {
  var btn = document.getElementById('save-btn');
  btn.disabled    = true;
  btn.textContent = '⏳ Saving…';
  hideStatus('save-status');

  var savePayload = {
    submittedBy: payload.submittedBy,
    rawInput:    (payload.images && payload.images.length ? '[' + payload.images.length + ' screenshot(s)] ' : '') + (payload.rawInput || ''),
    sourceUrl:   payload.sourceUrl || ''
  };

  try {
    var res    = await fetch('/.netlify/functions/save', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ payload: savePayload, fields: aiFields })
    });
    var result = await res.json();
    onSaveOk(result);
  } catch (err) {
    onSaveFail(err);
  }
}

function onSaveOk(result) {
  var btn = document.getElementById('save-btn');
  btn.disabled    = false;
  btn.textContent = '✅ Save to Intake Sheet';
  if (result.success) {
    showStatus('save-status', '✅ Saved to the Intake sheet!', 'success');
    setTimeout(resetAll, 3000);
  } else {
    showStatus('save-status', '❌ ' + (result.error || 'unknown error'), 'error');
  }
}

function onSaveFail(err) {
  var btn = document.getElementById('save-btn');
  btn.disabled    = false;
  btn.textContent = '✅ Save to Intake Sheet';
  showStatus('save-status', '❌ ' + (err.message || err), 'error');
}

// ── reset ─────────────────────────────────────────────────────
function resetAll() {
  document.getElementById('text-input').value  = '';
  document.getElementById('text-url').value    = '';
  document.getElementById('url-input').value   = '';
  document.getElementById('url-notes').value   = '';
  document.getElementById('photo-notes').value = '';
  document.getElementById('photo-file').value  = '';

  images = [];
  renderPhotosGrid();

  payload = null; aiFields = null;

  document.getElementById('preview-card').style.display   = 'none';
  document.getElementById('footer-analyze').style.display = 'block';
  document.getElementById('footer-save').style.display    = 'none';
  hideStatus('analyze-status');
  hideStatus('save-status');

  // back to photo tab
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p)   { p.classList.remove('active'); });
  document.getElementById('tab-photo').classList.add('active');
  document.getElementById('panel-photo').classList.add('active');
  activeTab = 'photo';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
